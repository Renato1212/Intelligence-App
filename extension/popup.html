<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body { width: 360px; margin: 0; padding: 12px; background: #17150f; color: #e8e2d5; font: 13px/1.45 system-ui, sans-serif; }
      h1 { font-size: 14px; margin: 0 0 4px; color: #d3a94f; }
      p { margin: 4px 0 10px; color: #a89f8c; font-size: 12px; }
      button { background: #d3a94f; color: #17150f; border: 0; border-radius: 6px; padding: 8px 12px; font-weight: 700; cursor: pointer; }
      button.secondary { background: #2a2620; color: #e8e2d5; }
      button:disabled { opacity: .5; cursor: default; }
      #status { margin: 8px 0; font-size: 12px; color: #8fbf6f; min-height: 16px; }
      #status.err { color: #e66767; }
      textarea { width: 100%; height: 150px; box-sizing: border-box; background: #100e0a; color: #cfc7b4; border: 1px solid #2a2620; border-radius: 6px; font: 11px/1.4 ui-monospace, monospace; padding: 6px; }
      .row { display: flex; gap: 8px; margin-top: 8px; }
    </style>
  </head>
  <body>
    <h1>Edge Capture</h1>
    <p>Open the Trader One panel that shows your <b>orders / fills / trade history table</b>, then capture. The text below is ready for <b>Edge Intelligence → Import → paste</b>.</p>
    <button id="capture">⤓ Capture trading data</button>
    <div id="status"></div>
    <textarea id="out" placeholder="Captured rows appear here…" readonly></textarea>
    <div class="row">
      <button id="copy" class="secondary" disabled>Copy</button>
      <button id="download" class="secondary" disabled>Download .txt</button>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
